name: Sync Garmin Data and Build Dashboard

on:
  schedule:
    # 1. Run check every 12 hours (00:00 and 12:00 UTC)
    - cron: '0 */12 * * *'
    # 2. Hard runs on Wednesday and Saturday morning at 12:00 UTC
    - cron: '0 12 * * 3,6'
  
  workflow_dispatch:

concurrency:
  group: garmin-sync
  cancel-in-progress: false

permissions:
  contents: write
  pages: write      # Required for GitHub Pages deployment
  id-token: write   # Required for secure deployment verification

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore cached Garmin session
        uses: actions/cache@v4
        with:
          path: .garmin_tokens
          key: garmin-tokens

      - name: Fetch Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python scripts/fetch_garmin.py

      - name: Build HTML dashboard
        run: python scripts/build_dashboard.py

      - name: Generate PDF with headless Chrome
        run: |
          google-chrome \
            --headless \
            --disable-gpu \
            --no-sandbox \
            --print-to-pdf=docs/dashboard.pdf \
            --print-to-pdf-no-header \
            --run-all-compositor-stages-before-draw \
            --virtual-time-budget=8000 \
            --paper-width=8.27 \
            --paper-height=11.69 \
            "file://$(pwd)/docs/print.html"

      # ── DETERMINING EMAIL LOGIC ──────────────────────────────────────────
      - name: Evaluate Email Rules
        id: evaluate_rules
        run: |
          DAY_OF_WEEK=$(date +%u) # 3 = Wednesday, 6 = Saturday
          
          if [ "${{ env.GARMIN_NEW_DATA }}" = "true" ] || [ "$DAY_OF_WEEK" = "3" ] || [ "$DAY_OF_WEEK" = "6" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SHOULD_EMAIL=true" >> $GITHUB_ENV
            echo "Proceeding with email (Condition met)."
          else
            echo "SHOULD_EMAIL=false" >> $GITHUB_ENV
            echo "No new activities and outside scheduled window. Skipping email."
          fi

      # ── Commit data + dashboard back to repo ─────────────────────────────
      - name: Commit and push
        run: |
          git config user.name "garmin-bot"
          git config user.email "actions@github.com"
          git add data/activities.json data/wellness.json \
                   docs/index.html docs/print.html docs/dashboard.pdf
          git diff --quiet --cached || git commit -m "Auto-sync: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull origin main --no-rebase -X ours
          git push

      # ── Deploy directly to GitHub Pages ──────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact (docs folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs' # Tells GitHub to host your dashboard out of the /docs folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── Email PDF (CONDITIONAL) ──────────────────────────────────────────
      - name: Email dashboard PDF
        if: env.SHOULD_EMAIL == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Training Dashboard — ${{ github.run_started_at }}"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: Garmin Dashboard Bot
          body: |
            Your training dashboard has been updated.

            📊 Live website: https://chetcutijc.github.io/GARMIN/
            📎 PDF attached for offline reading.

            Auto-synced from Garmin Connect (Every 12 hours / Scheduled Wed & Sat)
          attachments: docs/dashboard.pdf
