name: Sync Garmin Data and Build Dashboard

on:
  schedule:
    - cron: '0 */12 * * *'        # every 12 hours
    - cron: '0 12 * * 3,6'        # hard run Wed + Sat at noon UTC
  workflow_dispatch:

concurrency:
  group: garmin-sync
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore cached Garmin session
        uses: actions/cache@v4
        with:
          path: .garmin_tokens
          key: garmin-tokens

      - name: Fetch Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python scripts/fetch_garmin.py

      - name: Build HTML dashboard
        run: python scripts/build_dashboard.py

      - name: Generate PDF with headless Chrome
        run: |
          google-chrome \
            --headless \
            --disable-gpu \
            --no-sandbox \
            --print-to-pdf=docs/dashboard.pdf \
            --print-to-pdf-no-header \
            --run-all-compositor-stages-before-draw \
            --virtual-time-budget=8000 \
            --paper-width=8.27 \
            --paper-height=11.69 \
            "file://$(pwd)/docs/print.html"

      # ── Upload Pages artifact (only once, right after building) ─────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      # ── Commit data + dashboard back to repo ────────────────────────────
- name: Commit and push
        id: git_push
        run: |
          git config user.name "garmin-bot"
          git config user.email "actions@github.com"
          # Use the -f (force) flag to guarantee Git stages the dashboard files
          git add -f data/activities.json data/wellness.json \
                      docs/index.html docs/print.html docs/dashboard.pdf
          
          if ! git diff --quiet --cached; then
            git commit -m "Auto-sync: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull origin main --no-rebase -X theirs
            git push
          else
            echo "No changes to commit."
          fi

      # ── Decide whether to email ─────────────────────────────────────────
      - name: Evaluate email rules
        id: evaluate_rules
        run: |
          DAY=$(date +%u)   # 3=Wed, 6=Sat
          if [ "${{ env.GARMIN_NEW_DATA }}" = "true" ] || \
             [ "$DAY" = "3" ] || [ "$DAY" = "6" ] || \
             [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SHOULD_EMAIL=true" >> $GITHUB_ENV
          else
            echo "SHOULD_EMAIL=false" >> $GITHUB_ENV
          fi

      # ── Email PDF (conditional) ─────────────────────────────────────────
      - name: Email dashboard PDF
        if: env.SHOULD_EMAIL == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Training Dashboard Update"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: Garmin Dashboard Bot
          body: |
            Your training dashboard has been updated.

            📊 Live website: https://chetcutijc.github.io/TRI/
            📎 PDF attached for offline reading.

            Auto-synced from Garmin Connect (every 12h / Wed & Sat)
          attachments: docs/dashboard.pdf

  # ── Deploy to GitHub Pages (separate job, runs after sync) ─────────────
  deploy:
    needs: sync
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
