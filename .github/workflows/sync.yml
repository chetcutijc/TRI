name: Sync Garmin Data and Build Dashboard

on:
  schedule:
    # 1. Check for new activities every 12 hours (00:00 and 12:00 UTC)
    - cron: '0 */12 * * *'
    # 2. Hard runs on Wednesday and Saturday morning at 12:00 UTC
    - cron: '0 12 * * 3,6'
  
  workflow_dispatch:

concurrency:
  group: garmin-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore cached Garmin session
        uses: actions/cache@v4
        with:
          path: .garmin_tokens
          key: garmin-tokens

      - name: Fetch Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python scripts/fetch_garmin.py

      - name: Build HTML dashboard
        run: python scripts/build_dashboard.py

      - name: Add Cloudflare Pages redirects
        run: |
          echo "/* /index.html 200" > docs/_redirects

      - name: Generate PDF with headless Chrome
        run: |
          google-chrome \
            --headless \
            --disable-gpu \
            --no-sandbox \
            --print-to-pdf=docs/dashboard.pdf \
            --print-to-pdf-no-header \
            --run-all-compositor-stages-before-draw \
            --virtual-time-budget=8000 \
            --paper-width=8.27 \
            --paper-height=11.69 \
            "file://$(pwd)/docs/print.html"

      # ── CHECK FOR UPDATES OR SCHEDULE ──────────────────────────────────
      # This step sets a variable 'SHOULD_EMAIL' to true if files changed or if it's Wed/Sat
      - name: Check if email is required
        id: email_check
        run: |
          # Check if changes exist in data or docs folder
          git status --porcelain data/ docs/
          CHANGES=$(git status --porcelain data/ docs/ | wc -l)
          
          # Check the current day of the week (3 = Wednesday, 6 = Saturday)
          DAY_OF_WEEK=$(date +%u)
          HOUR=$(date +%H)
          
          # Determine if it's a forced schedule window (Wed/Sat around 12:00 UTC)
          if [ "$DAY_OF_WEEK" = "3" ] || [ "$DAY_OF_WEEK" = "6" ]; then
             IS_SCHEDULED_WINDOW="true"
          else
             IS_SCHEDULED_WINDOW="false"
          fi

          if [ "$CHANGES" -gt 0 ] || [ "$IS_SCHEDULED_WINDOW" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SHOULD_EMAIL=true" >> $GITHUB_ENV
            echo "Email conditions met (New data, Scheduled day, or Manual run)."
          else
            echo "SHOULD_EMAIL=false" >> $GITHUB_ENV
            echo "No new data and not a scheduled day. Skipping email."
          fi

      # ── Commit data + dashboard ──────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name "garmin-bot"
          git config user.email "actions@github.com"
          git add data/activities.json data/wellness.json \
                   docs/index.html docs/print.html docs/dashboard.pdf docs/_redirects
          git diff --quiet --cached || git commit -m "Auto-sync: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull origin main --no-rebase -X ours
          git push

      # ── Deploy to Cloudflare Pages ───────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs --project-name=garmin-dashboard --commit-dirty=true
        continue-on-error: true

      # ── Email PDF (CONDITIONAL) ──────────────────────────────────────────
      # This will now ONLY run if SHOULD_EMAIL was set to true
      - name: Email dashboard PDF
        if: env.SHOULD_EMAIL == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Training Dashboard — ${{ github.run_started_at }}"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: Garmin Dashboard Bot
          body: |
            Your training dashboard has been updated.

            📊 Live website: https://chetcutijc.github.io/GARMIN/
            📎 PDF attached for offline reading.

            Auto-synced from Garmin Connect (Every 12 hours / Scheduled Wed & Sat)
          attachments: docs/dashboard.pdf
