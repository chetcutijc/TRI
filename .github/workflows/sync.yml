name: Sync Garmin Data and Build Dashboard

on:
  schedule:
    # Runs at 12:00 UTC (around morning/noon depending on your timezone) every Wednesday and Saturday
    - cron: '0 12 * * 3,6'
  
  # Keeps the ability to run it manually via the GitHub UI if needed
  workflow_dispatch:

concurrency:
  group: garmin-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore cached Garmin session
        uses: actions/cache@v4
        with:
          path: .garmin_tokens
          key: garmin-tokens

      - name: Fetch Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python scripts/fetch_garmin.py

      - name: Build HTML dashboard
        run: python scripts/build_dashboard.py

      # ── Cloudflare Pages routing fix ─────────────────────────────────────
      # Ensures any unknown path falls back to index.html (SPA-style routing)
      - name: Add Cloudflare Pages redirects
        run: |
          echo "/* /index.html 200" > docs/_redirects

      # ── Generate PDF using headless Chrome ──────────────────────────────
      # Uses docs/print.html — a single-column, print-optimised page built
      # specifically for PDF export. Identical visual quality to window.print().
      - name: Generate PDF with headless Chrome
        run: |
          google-chrome \
            --headless \
            --disable-gpu \
            --no-sandbox \
            --print-to-pdf=docs/dashboard.pdf \
            --print-to-pdf-no-header \
            --run-all-compositor-stages-before-draw \
            --virtual-time-budget=8000 \
            --paper-width=8.27 \
            --paper-height=11.69 \
            "file://$(pwd)/docs/print.html"

      # ── Commit data + dashboard ──────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name "garmin-bot"
          git config user.email "actions@github.com"
          git add data/activities.json data/wellness.json \
                  docs/index.html docs/print.html docs/dashboard.pdf docs/_redirects
          git diff --quiet --cached || git commit -m "Auto-sync: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull origin main --no-rebase -X ours
          git push

      # ── Deploy to Cloudflare Pages ───────────────────────────────────────
      # Free tier — works with private repos, gives you a bookmarkable URL.
      # Setup: create a Cloudflare account, then add two repo secrets:
      #   CLOUDFLARE_API_TOKEN  (My Profile → API Tokens → Create Token →
      #                          use "Edit Cloudflare Workers" template,
      #                          then add Pages:Edit permission)
      #   CLOUDFLARE_ACCOUNT_ID (right sidebar on cloudflare.com dashboard)
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs --project-name=garmin-dashboard --commit-dirty=true
        continue-on-error: true   # don't fail the whole run if CF deploy fails

      # ── Email PDF ────────────────────────────────────────────────────────
      - name: Email dashboard PDF
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Training Dashboard — ${{ github.run_started_at }}"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: Garmin Dashboard Bot
          body: |
            Your training dashboard has been updated.

            📊 Live website: https://chetcutijc.github.io/TRI/
            📎 PDF attached for offline reading.

            Auto-synced from Garmin Connect: Wed & Sat
          attachments: docs/dashboard.pdf
