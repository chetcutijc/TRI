name: Sync Garmin Data and Build Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}       # lets you trigger manually from GitHub UI

# Prevent overlapping runs from racing to push at the same time, which causes
# merge conflicts in the auto-generated docs/index.html.
concurrency:
  group: garmin-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest main before doing anything
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore cached Garmin session
        uses: actions/cache@v4
        with:
          path: .garmin_tokens
          key: garmin-tokens

      - name: Fetch Garmin activities
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python scripts/fetch_garmin.py

      - name: Build dashboard
        run: python scripts/build_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "garmin-bot"
          git config user.email "actions@github.com"
          git add data/activities.json data/wellness.json docs/index.html
          git diff --quiet --cached || git commit -m "Auto-sync: $(date -u +'%Y-%m-%d %H:%M UTC')"
          # docs/index.html is fully regenerated every run, so if main moved while we
          # were running, always keep our freshly-built version rather than merging diffs.
          git pull origin main --no-rebase -X ours
          git push

      - name: Email dashboard
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Training Dashboard Update"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: Garmin Dashboard Bot
          body: "Your training dashboard has been refreshed. See attached HTML file (open in any browser) or view the latest version in your GitHub repo under docs/index.html."
          attachments: docs/index.html
